substitutions:
  name: esp-kyo-alarm
  friendly_name: "ESP KYO Alarm"

external_components:
  - source:
      type: local
      path: components

esphome:
  name: ${name}
  comment: "ESP KYO alarm integration"
  libraries:
    - "td-er/RABurton ESP8266 Mutex @ ^1.0.2"

# Configurazione piattaforma per ESP8266
esp8266:
  board: d1_mini_pro

# Global values
globals:
  # Arm home partitions (bitfield) as configured in alarm
  - id: armed_home
    type: uint8_t
    restore_value: no
    # 0x5E corresponds to IDIIIIID --> 01111101 binary with area 2 and area 8 disabled
    initial_value: '0x7D'
  # Arm away partitions (bitfield) as configured in alarm
  - id: armed_away
    type: uint8_t
    restore_value: no
    # 0x5E corresponds to IIIIIIID --> 01111111 binary with only area 8 disabled
    initial_value: '0x7F'

# Enable logging
logger:
  level: INFO
  baud_rate: 0

# HA API con crittografia e servizi abilitati correttamente
api:
  encryption:
    key: "uEwZ2jK8XwB1FvN5M9PqR4sT7uV8wXz1A2B3C4D5E6F="
  custom_services: true

# Configurazione OTA
ota:
  platform: esphome
  password: "d365c91e4f3c7987bd7a5e82baf7d680"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Kyo-Alarm Fallback Hotspot"
    password: "m7x57GpCKOik"

# Reference time
time:
  - platform: homeassistant
    id: ha_time
    timezone: Europe/Rome
    on_time_sync:
      then:
        lambda: |-
          if (global_kyo != nullptr) {
            global_kyo->onTimeSync(id(ha_time).now());
          }

# Configure UART link to KYO alarm
uart:
  id: uart_bus
  tx_pin: GPIO5
  rx_pin: GPIO4
  baud_rate: 9600
  data_bits: 8
  parity: EVEN

uart_kyo:
  id: kyo_alarm_core
  uart_id: uart_bus
  armed_home_id: armed_home
  armed_away_id: armed_away
  update_interval: 2s

# Restart buttons
button:
  - platform: restart
    name: "${friendly_name} Restart"
  - platform: safe_mode
    name: "${friendly_name} Restart (Safe Mode)"
    disabled_by_default: true

# Text sensors convertiti in Template per aggirare la rimozione di "custom"
text_sensor:
  - platform: template
    id: kyo_alarm_status
    name: "Alarm Status"
    icon: "mdi:shield"
    update_interval: 2s
    lambda: |-
      if (global_kyo != nullptr && global_kyo->alarmStatusSensor != nullptr) {
        return global_kyo->alarmStatusSensor->state;
      }
      return {"Unknown"};
  - platform: template
    id: kyo_model
    name: "Model"
    icon: "mdi:shield-home"
    entity_category: "diagnostic"
    update_interval: 2s
    lambda: |-
      if (global_kyo != nullptr && global_kyo->modelSensor != nullptr) {
        return global_kyo->modelSensor->state;
      }
      return {"Unknown"};
  - platform: template
    id: kyo_firmware
    name: "Firmware"
    icon: "mdi:memory"
    entity_category: "diagnostic"
    update_interval: 2s
    lambda: |-
      if (global_kyo != nullptr && global_kyo->firmwareSensor != nullptr) {
        return global_kyo->firmwareSensor->state;
      }
      return {"Unknown"};

# Generic sensors interni convertiti in Template
sensor:
  - platform: template
    id: kyo_warning
    name: "Warning flags"
    internal: true
    update_interval: 2s
    lambda: |-
      if (global_kyo != nullptr && global_kyo->warningSensor != nullptr) {
        return global_kyo->warningSensor->state;
      }
      return {};
  - platform: template
    id: kyo_tamper
    name: "Tamper flags"
    internal: true
    update_interval: 2s
    lambda: |-
      if (global_kyo != nullptr && global_kyo->tamperSensor != nullptr) {
        return global_kyo->tamperSensor->state;
      }
      return {};

# Binary sensors di zona convertiti per la massima compatibilità
binary_sensor:
  - platform: template
    id: kyo_zone1
    name: "Ingresso"
    device_class: "door"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[0].state);
  - platform: template
    id: kyo_zone2
    name: "Radar Sala"
    device_class: "motion"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[1].state);
  - platform: template
    id: kyo_zone3
    name: "Radar Garage"
    device_class: "motion"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[2].state);
  - platform: template
    id: kyo_zone4
    name: "Finestra Cucina"
    device_class: "window"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[3].state);
  - platform: template
    id: kyo_zone5
    name: "Finestra Bagno"
    device_class: "window"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[4].state);
  - platform: template
    id: kyo_zone6
    name: "Finestra Cameretta"
    device_class: "window"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[5].state);
  - platform: template
    id: kyo_zone7
    name: "Finestra Matrimoniale"
    device_class: "window"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[6].state);
  - platform: template
    id: kyo_zone8
    name: "Finestra Sala"
    device_class: "window"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[7].state);
  - platform: template
    id: kyo_zone9
    name: "Ripetitore"
    device_class: "motion"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[8].state);
  - platform: template
    id: kyo_zone10
    name: "Esterno Dietro"
    device_class: "motion"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[9].state);
  - platform: template
    id: kyo_zone11
    name: "Esterno Avanti"
    device_class: "motion"
    lambda: |-
      return (global_kyo != nullptr && global_kyo->zoneSensor[10].state);

  # Warnings Diagnostici
  - platform: template
    id: kyo_warn_mains
    name: "Mains failure"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x01) > 0);
  - platform: template
    id: kyo_warn_bpi
    name: "Missing BPI"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x02) > 0);
  - platform: template
    id: kyo_warn_fuse
    name: "Fuse warning"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x04) > 0);
  - platform: template
    id: kyo_warn_batt
    name: "Low battery"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x08) > 0);
  - platform: template
    id: kyo_warn_phone
    name: "Telephone line"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x10) > 0);
  - platform: template
    id: kyo_warn_code
    name: "Default code"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x20) > 0);
  - platform: template
    id: kyo_warn_wireless
    name: "Wireless warning"
    device_class: "problem"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_warning).state) & 0x40) > 0);

  # Tampers Diagnostici
  - platform: template
    id: kyo_tamp_zone
    name: "Zone tamper"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x04) > 0);
  - platform: template
    id: kyo_tamp_key
    name: "False key"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x08) > 0);
  - platform: template
    id: kyo_tamp_bpi
    name: "BPI tamper"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x10) > 0);
  - platform: template
    id: kyo_tamp_sys
    name: "System tamper"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x20) > 0);
  - platform: template
    id: kyo_tamp_jam
    name: "Jam"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x40) > 0);
  - platform: template
    id: kyo_tamp_wireless
    name: "Wireless tamper"
    device_class: "tamper"
    lambda: |-
      return((static_cast<uint8_t>(id(kyo_tamper).state) & 0x80) > 0);
